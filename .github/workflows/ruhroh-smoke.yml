name: Ruhroh Smoke

on:
  workflow_dispatch:
    inputs:
      live_gemini:
        description: "Run the optional live Gemini custom-shell smoke. Requires GEMINI_API_KEY secret."
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  pull_request:
    paths:
      - "README.md"
      - "CHANGELOG.md"
      - "CONTRIBUTING.md"
      - "SECURITY.md"
      - "package.json"
      - "pnpm-lock.yaml"
      - "assets/**"
      - "src/**"
      - "python/**"
      - "scenarios/**"
      - "tests/**"
      - "examples/scenarios/**"
      - "examples/adapters/**"
      - "docs/**"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/workflows/ruhroh-smoke.yml"
  push:
    branches:
      - main
    paths:
      - "README.md"
      - "CHANGELOG.md"
      - "CONTRIBUTING.md"
      - "SECURITY.md"
      - "package.json"
      - "pnpm-lock.yaml"
      - "assets/**"
      - "src/**"
      - "python/**"
      - "scenarios/**"
      - "tests/**"
      - "examples/scenarios/**"
      - "examples/adapters/**"
      - "docs/**"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/workflows/ruhroh-smoke.yml"

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test Ruhroh package
        run: pnpm test

      - name: Build Ruhroh package
        run: pnpm build

      - name: Pack Ruhroh package
        run: pnpm pack --pack-destination /tmp/ruhroh-pack

      - name: List example scenarios
        run: node dist/cli.js --scenario-dir examples/scenarios --list

      - name: Dry-run Gemini custom-shell smoke
        run: node dist/cli.js --scenario-dir examples/scenarios --scenario simple-newsletter --adapter custom-shell --dry-run

      - name: Generate example Harbor task
        run: node dist/cli.js --scenario-dir examples/scenarios --scenario simple-newsletter --generate-only

      - name: Install Harbor for optional live Gemini smoke
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.live_gemini == 'true' }}
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/uv" tool install harbor

      - name: Install Gemini CLI for optional live smoke
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.live_gemini == 'true' }}
        run: npm install -g @google/gemini-cli

      - name: Run optional live Gemini custom-shell smoke
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.live_gemini == 'true' }}
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node dist/cli.js --scenario-dir examples/scenarios --scenario simple-newsletter --adapter examples/adapters/gemini-cli/run.sh
