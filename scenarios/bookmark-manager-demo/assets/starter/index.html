<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bookmark Manager</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main>
      <h1>Bookmark Manager</h1>
      <p>Local-only bookmark saving app. Complete the implementation in this workspace.</p>

      <form id="bookmark-form">
        <label>
          Title
          <input id="title-input" name="title" autocomplete="off">
        </label>
        <label>
          URL
          <input id="url-input" name="url" autocomplete="off">
        </label>
        <label>
          Notes
          <textarea id="notes-input" name="notes"></textarea>
        </label>
        <button type="submit">Save bookmark</button>
      </form>

      <label>
        Search
        <input id="search-input" autocomplete="off">
      </label>

      <ul id="bookmark-list"></ul>
    </main>

    <script type="module" src="./src/app.js"></script>
  </body>
</html>
